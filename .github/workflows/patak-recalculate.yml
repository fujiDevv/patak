name: Patak Metrics Recalculator

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger from Actions tab

jobs:
  recalculate:
    name: Trigger Recalculate Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook Request
        env:
          METRICS_WEBHOOK_URL: ${{ secrets.METRICS_WEBHOOK_URL }}
          INGEST_SECRET:       ${{ secrets.INGEST_SECRET }}
        run: |
          curl -f -X POST "$METRICS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"$INGEST_SECRET\"}"
