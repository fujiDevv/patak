name: Patak CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS Dependencies
        run: bun install

      - name: Nuxt Prepare (Generate Types)
        run: bun npx nuxt prepare

      - name: Build Application
        run: bun run build

  validate-scraper:
    name: Scraper Code Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check Python Syntax
        run: python -m py_compile scripts/extract_and_parse.py
