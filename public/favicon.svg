<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Water Drop Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <!-- Lightning Bolt Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Water Drop Path -->
  <path d="M256,40 C256,40 400,220 400,340 C400,420 335,480 256,480 C177,480 112,420 112,340 C112,220 256,40 256,40 Z" fill="url(#dropGrad)" />
  
  <!-- Subtle Internal Glow Path -->
  <path d="M256,60 C256,60 380,230 380,340 C380,410 325,460 256,460 C187,460 132,410 132,340 C132,230 256,60 256,60 Z" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.15" />

  <!-- Lightning Bolt Path (centered inside the drop) -->
  <path d="M275,180 L180,310 L250,310 L225,430 L330,290 L260,290 Z" fill="url(#boltGrad)" filter="url(#glow)" />
</svg>
